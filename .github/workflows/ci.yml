name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-ts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm test

  test-java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test
      - name: Publish Java test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Java Tests
          path: java/build/test-results/test/TEST-*.xml
          reporter: java-junit
          fail-on-error: false
